<title>คำศัพท์โรงแรม</title>
<style>
:root{--gold:#BF9B47;--cream:#FDFAF3;--dark:#18120A;--mid:#6B5230;--en:#14345A;--de:#5A1A1A;--en-bg:#EEF3FA;--de-bg:#FAF0EE;--border:rgba(191,155,71,0.2);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);font-family:system-ui,sans-serif;color:var(--dark);}
header{background:var(--dark);padding:26px 16px 18px;text-align:center;position:relative;}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
header h1{font-size:1.4rem;color:var(--gold);font-weight:900;line-height:1.2;}
header p{color:rgba(229,208,138,0.7);font-size:0.78rem;margin-top:4px;font-style:italic;}
.wk-badge{display:inline-block;background:var(--gold);color:var(--dark);font-size:0.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:3px 12px;border-radius:12px;margin-top:10px;}
.body{max-width:680px;margin:0 auto;padding:18px 12px 48px;}
.section{margin-bottom:22px;}
.sec-head{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
.sec-head .flag{font-size:1.3rem;}
.sec-head h2{font-size:.95rem;font-weight:700;}
.sec-head.en h2{color:var(--en);}
.sec-head.de h2{color:var(--de);}
.pill{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:8px;}
.sec-head.en .pill{background:var(--en-bg);color:var(--en);}
.sec-head.de .pill{background:var(--de-bg);color:var(--de);}
table{width:100%;border-collapse:collapse;border-radius:10px;overflow:hidden;box-shadow:0 2px 10px rgba(24,18,10,.07);}
thead tr{font-size:.62rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.section.en thead tr{background:var(--en);color:#fff;}
.section.de thead tr{background:var(--de);color:#fff;}
thead th{padding:8px 10px;text-align:left;}
thead th:first-child{width:24px;text-align:center;}
thead th:nth-child(2){width:30%;}
thead th:nth-child(3){width:26%;}
tbody tr{border-bottom:1px solid var(--border);}
tbody tr:last-child{border-bottom:none;}
tbody tr:nth-child(odd){background:#fff;}
tbody tr:nth-child(even){background:rgba(253,250,243,.8);}
tbody td{padding:8px 10px;vertical-align:middle;}
tbody td:first-child{text-align:center;font-weight:700;font-size:.72rem;}
.section.en tbody td:first-child{color:var(--en);}
.section.de tbody td:first-child{color:var(--de);}
.cw{font-weight:700;font-size:.84rem;color:var(--dark);}
.cr{font-size:.78rem;color:#2D6B2D;font-weight:600;}
.ct{font-size:.78rem;color:var(--mid);}
.divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:20px 0;}
footer{background:var(--dark);color:rgba(229,208,138,.4);text-align:center;font-size:.62rem;letter-spacing:.1em;padding:12px;}
</style>
</head>

</header>
